<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>伊都文化会館 大ホール 空席情報</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Hiragino Sans", "Meiryo", sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      padding: 16px;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 0.85rem;
      color: #555;
      flex-wrap: wrap;
    }

    .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid #ccc;
      border-top-color: #555;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .spinner.active { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      display: none;
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ef9a9a;
      border-radius: 6px;
      padding: 8px 14px;
      text-align: center;
      font-size: 0.85rem;
      margin-bottom: 12px;
    }
    .error-msg.visible { display: block; }

    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 16px;
      font-size: 0.85rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .legend-box {
      width: 18px;
      height: 18px;
      border-radius: 3px;
    }
    .legend-box.available { background: #4CAF50; }
    .legend-box.reserved  { background: #9E9E9E; }

    .seat-count {
      text-align: center;
      font-size: 1rem;
      font-weight: bold;
      margin-bottom: 20px;
      color: #2e7d32;
    }

    /* ホール全体ラッパー */
    .hall-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .hall {
      min-width: 640px;
      max-width: 900px;
      margin: 0 auto;
    }

    /* ステージ */
    .stage {
      background: #455a64;
      color: #fff;
      text-align: center;
      padding: 14px 0;
      border-radius: 6px 6px 0 0;
      font-size: 1rem;
      letter-spacing: 0.15em;
      margin-bottom: 24px;
    }

    /* 座席エリア */
    .seat-area {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .seat-row {
      display: flex;
      align-items: center;
      gap: 0;
    }

    /* 列ラベル */
    .row-label {
      width: 22px;
      min-width: 22px;
      font-size: 0.75rem;
      font-weight: bold;
      text-align: center;
      color: #666;
      user-select: none;
    }

    /* ブロックコンテナ */
    .blocks {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0;
    }

    .block {
      display: flex;
      flex-wrap: nowrap;
      gap: 3px;
    }

    /* 通路スペース */
    .aisle {
      width: 20px;
      min-width: 20px;
      flex-shrink: 0;
    }

    /* 座席ボタン */
    .seat {
      width: 22px;
      height: 22px;
      border-radius: 3px;
      border: none;
      cursor: default;
      position: relative;
      transition: filter 0.15s;
      flex-shrink: 0;
    }

    .seat.available {
      background: #4CAF50;
    }
    .seat.available:hover {
      filter: brightness(1.15);
    }
    .seat.reserved {
      background: #9E9E9E;
    }

    /* ツールチップ */
    .seat[data-tip]:hover::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 4px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-size: 0.7rem;
      white-space: nowrap;
      padding: 2px 6px;
      border-radius: 3px;
      pointer-events: none;
      z-index: 10;
    }

    footer {
      text-align: center;
      margin-top: 28px;
      font-size: 0.75rem;
      color: #aaa;
    }

    @media (max-width: 680px) {
      .seat { width: 18px; height: 18px; border-radius: 2px; }
      .aisle { width: 10px; min-width: 10px; }
      .block { gap: 2px; }
    }
  </style>
</head>
<body>

<header>
  <h1>伊都文化会館 大ホール 空席情報</h1>
  <div class="status-bar">
    <span id="updated-at">読み込み中...</span>
    <span class="spinner" id="spinner"></span>
  </div>
</header>

<div class="error-msg" id="error-msg"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-box available"></div><span>空席</span></div>
  <div class="legend-item"><div class="legend-box reserved"></div><span>予約済</span></div>
</div>

<div class="seat-count" id="seat-count">－</div>

<div class="hall-wrapper">
  <div class="hall">
    <div class="stage">▲ ステージ（舞台）</div>
    <div class="seat-area" id="seat-area">
      <!-- JS で描画 -->
    </div>
  </div>
</div>

<footer>5秒ごとに自動更新</footer>

<script>
  // ============================================================
  // 設定：GAS Web アプリの URL をここに貼り付けてください
  // ============================================================
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxwObS7LrpYx6jT6C1gBH32t6jCt2PdijIGWLEGUK8NyTgjSe8GWkZ-iWJJxJD7jSJtoA/exec";

  // ============================================================
  // 座席レイアウト定義
  // ============================================================
  const ROWS = ["A","B","C","D","E","F","G","H","I","J","K","L","M","N","O"];

  // A〜G：左(3-10), 中(1-24), 右(25-36)
  // H〜O：左(1-10), 中(1-24), 右(25-36)
  function getBlockDef(row) {
    const isAG = ["A","B","C","D","E","F","G"].includes(row);
    return {
      left:   isAG ? range(3, 10)  : range(1, 10),
      center: range(1, 24),
      right:  range(25, 36)
    };
  }

  function range(start, end) {
    const arr = [];
    for (let i = start; i <= end; i++) arr.push(i);
    return arr;
  }

  // ============================================================
  // 状態
  // ============================================================
  let lastData = null; // 最後に成功したデータ

  // ============================================================
  // 初期描画：DOM 構造を一度だけ生成
  // ============================================================
  function buildSeatDOM() {
    const area = document.getElementById("seat-area");
    area.innerHTML = "";

    ROWS.forEach(row => {
      const def = getBlockDef(row);
      const rowEl = document.createElement("div");
      rowEl.className = "seat-row";

      // 列ラベル
      const label = document.createElement("div");
      label.className = "row-label";
      label.textContent = row;
      rowEl.appendChild(label);

      // ブロックコンテナ
      const blocksEl = document.createElement("div");
      blocksEl.className = "blocks";

      // 左ブロック
      blocksEl.appendChild(buildBlock(row, def.left, "left"));
      // 通路
      blocksEl.appendChild(buildAisle());
      // 中央ブロック
      blocksEl.appendChild(buildBlock(row, def.center, "center"));
      // 通路
      blocksEl.appendChild(buildAisle());
      // 右ブロック
      blocksEl.appendChild(buildBlock(row, def.right, "right"));

      rowEl.appendChild(blocksEl);
      area.appendChild(rowEl);
    });
  }

  function buildBlock(row, seats, blockName) {
    const blockEl = document.createElement("div");
    blockEl.className = "block";
    seats.forEach(seatNum => {
      const btn = document.createElement("div");
      btn.className = "seat available";
      btn.dataset.tip = `${row}-${seatNum}`;
      btn.id = `seat-${row}-${seatNum}`;
      blockEl.appendChild(btn);
    });
    return blockEl;
  }

  function buildAisle() {
    const el = document.createElement("div");
    el.className = "aisle";
    return el;
  }

  // ============================================================
  // データ取得・座席更新
  // ============================================================
  async function fetchSeats() {
    const spinner = document.getElementById("spinner");
    const errorMsg = document.getElementById("error-msg");
    spinner.classList.add("active");

    try {
      const res = await fetch(GAS_API_URL, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      lastData = data;
      applySeats(data);
      errorMsg.classList.remove("visible");
    } catch (err) {
      errorMsg.textContent = `データ取得に失敗しました（${err.message}）。最後に取得したデータを表示しています。`;
      errorMsg.classList.add("visible");
      // 最後の成功データは保持したままにする
    } finally {
      spinner.classList.remove("active");
    }
  }

  function applySeats(data) {
    // すべての座席をリセット（万が一のため）
    document.querySelectorAll(".seat").forEach(el => {
      el.className = "seat available";
    });

    let totalSeats = 0;
    let reservedCount = 0;

    data.seats.forEach(s => {
      const el = document.getElementById(`seat-${s.row}-${s.seat_number}`);
      if (!el) return;
      totalSeats++;
      if (s.reserved) {
        el.className = "seat reserved";
        reservedCount++;
      }
    });

    const available = totalSeats - reservedCount;
    document.getElementById("seat-count").textContent =
      `残り ${available} 席 / 全 ${totalSeats} 席`;

    // 更新日時
    const dt = new Date(data.updated_at);
    const fmt = dt.toLocaleString("ja-JP", {
      year: "numeric", month: "2-digit", day: "2-digit",
      hour: "2-digit", minute: "2-digit", second: "2-digit"
    });
    document.getElementById("updated-at").textContent = `最終更新：${fmt}`;
  }

  // ============================================================
  // 起動
  // ============================================================
  buildSeatDOM();
  fetchSeats();
  setInterval(fetchSeats, 5000);
</script>
</body>
</html>
